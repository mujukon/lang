<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>辞書整形ツール</title>
<style>
body { font-family: sans-serif; margin: 20px; }
textarea { width: 100%; height: 150px; margin-bottom: 10px; }
#output { height: 200px; background: #f5f5f5; }
button { padding: 8px 16px; margin-right: 5px; }
</style>
</head>
<body>

<h3>出力（テキストエリア0・編集不可）</h3>
<textarea id="output" readonly></textarea><br>
<button onclick="copyOutput()">コピー</button>
<button onclick="exportJSON()">エクスポート</button>

<h3>元データ（テキストエリア1）</h3>
<textarea id="input1"></textarea><br>
<input type="file" id="fileInput" accept=".json" onchange="importJSON()">

<h3>追加単語（テキストエリア2）</h3>
<textarea id="input2" placeholder="dish	皿,料理	d始まり"></textarea>

<button onclick="process()">変換＆挿入</button>

<script>
function parseLine(line) {
    let parts = line.split(/\t|:|：/).map(s => s.trim()).filter(s => s);
    if (parts.length < 2) return null;

    let form = parts[0];
    let meanings = parts[1].split(",").map(s => s.trim());
    let tags = parts[2] ? parts[2].split(",").map(s => s.trim()) : [];

    return { form, meanings, tags };
}

function process() {
    let baseText = document.getElementById("input1").value;
    let addText = document.getElementById("input2").value;

    let data;
    try {
        data = JSON.parse(baseText);
    } catch (e) {
        alert("JSONが不正");
        return;
    }

    let words = data.words || [];
    let maxId = words.length > 0 ? Math.max(...words.map(w => w.entry.id)) : 0;

    let lines = addText.split("\n").map(l => l.trim()).filter(l => l);

    let newWords = [];

    for (let line of lines) {
        let parsed = parseLine(line);
        if (!parsed) continue;

        maxId++;

        let obj = {
            entry: { id: maxId, form: parsed.form },
            tags: parsed.tags,
            translations: [{
                title: "名詞",
                forms: parsed.meanings,
                rawForms: parsed.meanings.join(",")
            }],
            contents: [{
                title: "発音",
                text: ""
            }],
            variations: [],
            relations: []
        };

        newWords.push(obj);
    }

    data.words = [...newWords, ...words];

    let result = JSON.stringify(data, null, 2);

    document.getElementById("output").value = result;
    document.getElementById("input1").value = result; // 更新も反映
}

function copyOutput() {
    let textarea = document.getElementById("output");
    textarea.select();
    document.execCommand("copy");
    alert("コピーした");
}

// エクスポート（ダウンロード）
function exportJSON() {
    let content = document.getElementById("output").value;
    if (!content) {
        alert("出力が空");
        return;
    }

    let blob = new Blob([content], { type: "application/json" });
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "dictionary.json";
    a.click();

    URL.revokeObjectURL(url);
}

// インポート（読み込み）
function importJSON() {
    let file = document.getElementById("fileInput").files[0];
    if (!file) return;

    let reader = new FileReader();
    reader.onload = function(e) {
        try {
            let text = e.target.result;
            JSON.parse(text); // バリデーション
            document.getElementById("input1").value = text;
            document.getElementById("output").value = text;
        } catch {
            alert("JSON形式じゃない");
        }
    };
    reader.readAsText(file);
}
</script>

</body>
</html>
